<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reuben Watson</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .subtitle {
            margin-top: 0.75rem;
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 400;
            color: #6e6e73;
            letter-spacing: 0.01em;
        }

        .games {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 200px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            color: #1d1d1f;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .game-card:active {
            transform: translateY(-1px);
        }

        .card-icon {
            font-size: 3rem;
            line-height: 1;
        }

        .card-title {
            margin-top: 0.85rem;
            font-size: 1.15rem;
            font-weight: 650;
            letter-spacing: -0.01em;
        }

        .card-desc {
            margin-top: 0.3rem;
            font-size: 0.82rem;
            color: #86868b;
            font-weight: 400;
        }

        .card-count {
            margin-top: 0.6rem;
            font-size: 0.74rem;
            font-weight: 600;
            color: #b0b0b5;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reuben Watson</h1>
        <p class="subtitle">Pick a game</p>

        <div class="games">
            <!--
              Add a game by dropping a card here. The play counter wires up
              automatically from the data-game / data-count attributes.

              <a class="game-card" href="snake.html" data-game="snake">
                  <span class="card-icon">🐍</span>
                  <span class="card-title">Snake</span>
                  <span class="card-desc">Classic arrow-key game</span>
                  <span class="card-count" data-count="snake">0 plays</span>
              </a>
            -->
        </div>
    </div>

    <script>
        // Per-device play counters (no backend) — stored in this browser's
        // localStorage. Each count ticks up when its card is opened.
        (function () {
            var KEY = 'reuben-play-counts';

            function load() {
                try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
                catch (e) { return {}; }
            }

            function save(counts) {
                try { localStorage.setItem(KEY, JSON.stringify(counts)); }
                catch (e) { /* storage unavailable — counts just won't persist */ }
            }

            function label(n) {
                return n + (n === 1 ? ' play' : ' plays');
            }

            var counts = load();

            // Render current counts under each card.
            document.querySelectorAll('.card-count').forEach(function (el) {
                el.textContent = label(counts[el.dataset.count] || 0);
            });

            // Increment on click, before navigation (setItem is synchronous).
            document.querySelectorAll('.game-card').forEach(function (card) {
                card.addEventListener('click', function () {
                    var game = card.dataset.game;
                    counts[game] = (counts[game] || 0) + 1;
                    save(counts);
                });
            });
        })();
    </script>
</body>
</html>
